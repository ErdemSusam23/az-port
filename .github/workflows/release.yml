name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run test suite
        run: go test ./...

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist/package

          while read -r goos goarch label_os label_arch ext archive; do
            [ -n "${goos}" ] || continue

            package_dir="dist/package/${label_os}_${label_arch}"
            mkdir -p "${package_dir}"

            if [ "${ext}" = "none" ]; then
              ext=""
            fi

            binary_name="az-port${ext}"
            artifact_name="az-port_${label_os}_${label_arch}.${archive}"

            GOOS="${goos}" GOARCH="${goarch}" go build -trimpath -ldflags="-s -w" -o "${package_dir}/${binary_name}" .
            cp README.md LICENSE "${package_dir}/"

            if [ "${archive}" = "zip" ]; then
              (
                cd "${package_dir}"
                zip -q -r "../../${artifact_name}" .
              )
            else
              tar -C "${package_dir}" -czf "dist/${artifact_name}" .
            fi
          done <<'EOF'
          windows amd64 Windows x86_64 .exe zip
          linux amd64 Linux x86_64 none tar.gz
          darwin amd64 macOS x86_64 none tar.gz
          darwin arm64 macOS arm64 none tar.gz
          EOF

          find dist -maxdepth 1 -type f \( -name '*.zip' -o -name '*.tar.gz' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > dist/checksums.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: az-port-release-artifacts
          path: |
            dist/*.zip
            dist/*.tar.gz
            dist/checksums.txt

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.tar.gz
            dist/checksums.txt
